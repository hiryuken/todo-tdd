# nginx.conf — serve i file statici e fa da proxy verso il backend Flask
# In questo modo il frontend chiama /api/... invece di http://localhost:5000/...
# ed evita completamente il problema CORS (stessa origine).

server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve i file statici (JS, HTML)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy verso il backend Flask
    # Il frontend chiama /api/health, /api/todos, ecc.
    # nginx toglie il prefisso /api e gira la richiesta a backend:5000
    location /api/ {
        proxy_pass         http://backend:5000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
    }
}
